<h1 class="serif-display text-4xl italic tracking-tighter text-on-surface">

<p class="font-body text-on-surface-variant text-sm mt-3 tracking-wide">

                    </p>
</div>
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant ml-1" for="email">Account Access</label>
<div class="relative group">
<input class="w-full bg-surface-container px-4 py-3.5 rounded-lg border-none focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50 text-sm" id="email" name="email" placeholder="Email or phone number" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant" for="password">Security Code</label>
<a class="font-label text-[10px] uppercase tracking-[0.05em] text-primary hover:opacity-70 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container px-4 py-3.5 rounded-lg border-none focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-outline/50 text-sm" id="password" name="password" placeholder="Enter password" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-label text-xs uppercase tracking-[0.15em] font-semibold shadow-lg shadow-primary/10 hover:bg-primary-dim active:scale-[0.98] transition-all duration-300 mt-4" type="submit">
                        Enter Atelier
                    </button>
</form>

<div class="w-full h-[1px] bg-outline-variant opacity-20"></div>

<span class="material-symbols-outlined text-outline text-lg">fingerprint</span>

</button>
<button class="flex items-center gap-2 group transition-opacity hover:opacity-70">
<span class="material-symbols-outlined text-outline text-lg">contactless</span>
<span class="font-label text-[10px] uppercase tracking-wider text-outline">Keys</span>
</button>
</div>
</div>
</div>
