<style>
        body { font-family: 'Manrope', sans-serif; }
        .serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 backdrop-blur-xl shadow-[0px_12px_32px_rgba(47,52,48,0.04)] flex items-center justify-between px-6 h-16">

</div>
<h1 class="font-['Noto_Serif'] tracking-tight text-emerald-900 font-bold">Settings</h1>
<div class="w-10 flex justify-end">
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-stone-400" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">
<!-- Account Section -->
<section class="space-y-4">
<h2 class="font-['Noto_Serif'] text-sm uppercase tracking-[0.1em] text-outline ml-1">Account</h2>
<div class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container overflow-hidden">
<img class="w-full h-full object-cover" data-alt="soft professional headshot of a woman with clean aesthetic and natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQ6wOP_muJwjEkh6V-smGE7Z4WEyjrefhWB0xL9KdUA8yzZ6OLz1Iy8m4T4wKYaFI8TnLfjv0-1DtTDz56lliUnV3_R1gaXLDj_IRvMQGfuKmToweHwFRIQJoEO0hLb-xibH9mZvF-VyRSoBb3Qr9MfKxuplHio7jTx32oCg74SjUGGg2ZvmbA_oDdr9cmQb2rSdQH2IHSsskU5uAi1cV28vt8gyNe93bnN7qk4Axi-bXeeX02iHTONIvxavOMNHMAdc0G5ZO68CXD"/>
</div>
<div>
<p class="font-semibold text-on-surface">Private Admin</p>
<p class="text-xs text-on-surface-variant font-medium">admin@vanitystock.atelier</p>
</div>
</div>
<button class="text-primary text-sm font-semibold hover:opacity-70 transition-opacity">Edit</button>
</div>
</section>
<!-- Data Management -->
<section class="space-y-4">
<h2 class="font-['Noto_Serif'] text-sm uppercase tracking-[0.1em] text-outline ml-1">Data Management</h2>
<div class="bg-surface-container-low rounded-xl overflow-hidden">
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-stone-400" data-icon="csv">csv</span>
<span class="text-sm font-medium">CSV Export</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-[1px] mx-4 bg-outline-variant/10"></div>
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container transition-colors group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-stone-400" data-icon="upload_file">upload_file</span>
<span class="text-sm font-medium">Import Data</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- App Preferences -->
<section class="space-y-4">
<h2 class="font-['Noto_Serif'] text-sm uppercase tracking-[0.1em] text-outline ml-1">App Preferences</h2>
<div class="bg-surface-container-low rounded-xl p-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-stone-400" data-icon="dark_mode">dark_mode</span>
<span class="text-sm font-medium">Appearance</span>
</div>
<div class="flex bg-surface-container-high p-1 rounded-full">
<button class="px-4 py-1.5 rounded-full text-xs font-bold bg-surface-container-lowest text-primary shadow-sm">Light</button>
<button class="px-4 py-1.5 rounded-full text-xs font-medium text-on-surface-variant hover:text-on-surface transition-colors">Dark</button>
</div>
</div>
</div>
</section>
<!-- PWA Status -->
<section class="space-y-4">
<h2 class="font-['Noto_Serif'] text-sm uppercase tracking-[0.1em] text-outline ml-1">PWA Status</h2>
<div class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-stone-400" data-icon="install_mobile">install_mobile</span>
<div>
<p class="text-sm font-medium">Install App</p>
<p class="text-[10px] uppercase tracking-wider text-outline-variant">Version 2.4.0-stable</p>
</div>
</div>
<span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Ready</span>
</div>
</section>
<!-- Danger Zone -->
<section class="pt-6">
<button class="w-full py-4 border-2 border-dashed border-outline-variant/20 rounded-xl text-error font-semibold text-sm hover:bg-error/5 transition-colors">
                Delete Account &amp; Data
            </button>
</section>

<span class="material-symbols-outlined mb-1" data-icon="dashboard">dashboard</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.02em]">Ritual</span>
</a>
<!-- Atelier (Inactive) -->
<a class="flex flex-col items-center justify-center text-stone-400 active:scale-95 transition-all duration-200 hover:text-emerald-800" href="#">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2">inventory_2</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.02em]">Atelier</span>
</a>
<!-- Add (Inactive) -->
<a class="flex flex-col items-center justify-center text-stone-400 active:scale-95 transition-all duration-200 hover:text-emerald-800" href="#">
<span class="material-symbols-outlined mb-1" data-icon="add_circle">add_circle</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.02em]">Add</span>
</a>
<!-- Curate (Active) -->

<span class="material-symbols-outlined mb-1" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-[0.02em]">Curate</span>
